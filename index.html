<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>My Website Style Guide</title>
    </head>
    <body>
        <h1>Website Style Guide</h1>

        <div id="colors" class="container">
            <h2>Colors</h2>

            <div class="color-board" id="charcoal">
                <p class="label">Charcoal</p>
                <p class="hex">Hex: #264653</p>
            </div>

            <div class="color-board" id="persian-green">
                <p class="label">Persian Green</p>
                <p class="hex">Hex Code: #2A9D8F</p>
            </div>

            <div class="color-board" id="orange-yellow">
                <p class="label">Orange Yellow Crayola</p>
                <p class="hex">Hex Code: #E9C46A</p>
            </div>

            <div class="color-board" id="sandy-brown">
                <p class="label">Sandy Brown</p>
                <p class="hex">Hex Code: #F4A261</p>
            </div>

            <div class="color-board" id="burnt-sienna">
                <p class="label">Burnt Sienna</p>
                <p class="hex">Hex Code: #E76F51</p>
            </div>
        </div>

        <div id="fonts">
            <h2>Fonts</h2>
        </div>
    </body>
</html>
